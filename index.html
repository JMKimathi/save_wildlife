<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>
        
        <div class="video-wrapper">
            <video id="wildlifeVideo" controls aria-label="Promotional video about wildlife conservation">
                <source src="wildlife.mp4" type="video/mp4">
                <track kind="captions" src="captions.vtt" srclang="en" label="English" default>
                Your browser does not support the video tag.
            </video>
        </div>

        <p class="description">
            Our planet's incredible biodiversity is under threat. Join us in our mission to protect endangered species, preserve natural habitats, and build a sustainable future where humans and wildlife can thrive together.
        </p>

        <button id="videoToggleBtn" aria-live="polite">Play Video</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
